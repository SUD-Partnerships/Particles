<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Particle Physics — Thumb + Mutual Interaction</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin:0; height:100%; background:#0a0a0a; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    touch-action: none; /* allow thumb interaction without scrolling */
  }
  #ui {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(20,20,20,0.78); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 10px 12px; display: grid; gap: 8px; color: #eaeaea;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    pointer-events: auto; user-select: none;
  }
  #ui .row { display:flex; flex-wrap: wrap; gap:10px; align-items:center; }
  #ui label { font-size:12px; opacity:.95; }
  #ui input[type="range"] { width: 260px; }
  #ui .pill { padding:2px 8px; border-radius:999px; font-size:12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.06); }
  #ui .sep { height:1px; background:rgba(255,255,255,0.08); margin:2px 0 4px; }
  #fps { font-variant-numeric: tabular-nums; }
  canvas { display:block; width:100vw; height:100vh; }
  small { opacity:.8; }
</style>
</head>
<body>
  <div id="ui">
    <div class="row">
      <label for="count">Particles:</label>
      <input id="count" type="range" min="1" max="100000" step="1" value="20000" />
      <span id="countLabel" class="pill">20,000</span>
    </div>
    <div class="row">
      <label for="force">Thumb Force</label>
      <input id="force" type="range" min="0" max="3000" step="10" value="900" />
      <span id="forceLabel" class="pill">900</span>

      <label for="mode">Thumb Mode</label>
      <select id="mode">
        <option value="attract">Attract</option>
        <option value="repel">Repel</option>
      </select>
    </div>
    <div class="row">
      <label for="size">Particle Size</label>
      <input id="size" type="range" min="1" max="6" step="1" value="3" />
      <span id="sizeLabel" class="pill">3 px</span>

      <label><input id="trails" type="checkbox" checked /> Trails</label>
      <label><input id="adaptive" type="checkbox" checked /> Adaptive compute</label>
      <span id="fps" class="pill">FPS: …</span>
    </div>
    <div class="sep"></div>
    <small>Use your thumb/mouse to attract/repel. Drag the slider to add/remove particles live.</small>
  </div>

  <canvas id="c"></canvas>

<script>
(() => {
  // ---------- Canvas setup ----------
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

  const DPR = () => Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
  let W = 0, H = 0, dpr = DPR();

  function resize() {
    const ndpr = DPR();
    if (ndpr !== dpr) dpr = ndpr;
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w; canvas.height = h;
      canvas.style.width = '100vw';
      canvas.style.height = '100vh';
      W = w; H = h;
    }
  }
  resize();
  window.addEventListener('resize', resize);

  // ---------- UI ----------
  const $ = id => document.getElementById(id);
  const countSlider = $('count'), countLabel = $('countLabel');
  const forceSlider = $('force'), forceLabel = $('forceLabel');
  const modeSelect = $('mode');
  const sizeSlider = $('size'), sizeLabel = $('sizeLabel');
  const trailsCheckbox = $('trails');
  const adaptiveCheckbox = $('adaptive');
  const fpsLabel = $('fps');

  // ---------- Simulation state ----------
  const MAX_CAP = 100000;
  let N = parseInt(countSlider.value, 10);
  let size = parseInt(sizeSlider.value, 10);
  let pointer = { active: false, x: 0, y: 0, force: parseFloat(forceSlider.value), mode: modeSelect.value };

  // Pre-allocate arrays to max capacity (avoid GC churn on slider)
  const posX = new Float32Array(MAX_CAP);
  const posY = new Float32Array(MAX_CAP);
  const velX = new Float32Array(MAX_CAP);
  const velY = new Float32Array(MAX_CAP);
  const color = new Uint32Array(MAX_CAP); // packed rgba for fast fillStyle caching

  // Spatial hash (rebuilt per frame)
  let CELL = 18 * dpr;      // neighbor radius ~ 18 px @DPR=1
  let gridCols = 0, gridRows = 0;
  let head = new Int32Array(0);
  const next = new Int32Array(MAX_CAP);

  const DAMP = 0.995;
  const VISC = 0.02;
  const MAX_SPEED = 260 * dpr;
  const R = 18 * dpr;        // neighbor influence radius
  const R2 = R * R;
  const K_REP = 1400.0;      // repulsion constant
  const TOUCH_SOFT = 80.0 * dpr;

  function updateGridDims() {
    CELL = R;
    gridCols = Math.max(1, Math.floor(W / CELL) + 1);
    gridRows = Math.max(1, Math.floor(H / CELL) + 1);
    head = new Int32Array(gridCols * gridRows);
  }
  updateGridDims();

  // ---------- Helpers ----------
  function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
  function rand(a, b) { return a + Math.random() * (b - a); }

  function hsvToRgb(h, s, v) {
    // h: [0..360), s: [0..1], v: [0..1] -> [0..255]
    let c = v * s;
    let x = c * (1 - Math.abs(((h / 60) % 2) - 1));
    let m = v - c;
    let r=0,g=0,b=0;
    if (h < 60) { r=c; g=x; b=0; }
    else if (h < 120) { r=x; g=c; b=0; }
    else if (h < 180) { r=0; g=c; b=x; }
    else if (h < 240) { r=0; g=x; b=c; }
    else if (h < 300) { r=x; g=0; b=c; }
    else { r=c; g=0; b=x; }
    r = Math.round((r + m) * 255);
    g = Math.round((g + m) * 255);
    b = Math.round((b + m) * 255);
    return (r<<24) | (g<<16) | (b<<8) | 0xFF; // pack RGBA in big-endian for caching
  }

  function setColorStyle(packed) {
    // Convert packed to CSS only when changes (cache last)
    if (setColorStyle._last !== packed) {
      const r = (packed >> 24) & 255;
      const g = (packed >> 16) & 255;
      const b = (packed >> 8) & 255;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      setColorStyle._last = packed;
    }
  }
  setColorStyle._last = 0;

  function cellIndex(x, y) {
    const cx = clamp((x / CELL) | 0, 0, gridCols - 1);
    const cy = clamp((y / CELL) | 0, 0, gridRows - 1);
    return cy * gridCols + cx;
  }

  function buildGrid() {
    head.fill(-1);
    for (let i=0; i<N; i++) {
      const idx = cellIndex(posX[i], posY[i]);
      next[i] = head[idx];
      head[idx] = i;
    }
  }

  function initParticles(count) {
    const oldN = N;
    N = clamp(count|0, 1, MAX_CAP);
    for (let i = oldN; i < N; i++) {
      posX[i] = rand(0, W);
      posY[i] = rand(0, H);
      const ang = Math.random() * Math.PI * 2;
      const spd = rand(20 * dpr, 90 * dpr);
      velX[i] = Math.cos(ang) * spd;
      velY[i] = Math.sin(ang) * spd;

      // Wide color spectrum: rainbow + jitter
      const hue = (360 * (i / Math.max(1, N)) + rand(0, 90)) % 360;
      color[i] = hsvToRgb(hue, 0.75, 0.95);
    }
    countLabel.textContent = N.toLocaleString();
  }

  // ---------- Pointer / Thumb ----------
  function updatePointerFromEvent(ev) {
    const rect = canvas.getBoundingClientRect();
    if (ev.touches && ev.touches.length) {
      const t = ev.touches[0];
      pointer.x = (t.clientX - rect.left) * dpr;
      pointer.y = (t.clientY - rect.top) * dpr;
    } else {
      pointer.x = (ev.clientX - rect.left) * dpr;
      pointer.y = (ev.clientY - rect.top) * dpr;
    }
  }

  canvas.addEventListener('pointerdown', (e) => { pointer.active = true; updatePointerFromEvent(e); });
  canvas.addEventListener('pointermove', (e) => { updatePointerFromEvent(e); });
  window.addEventListener('pointerup', () => { pointer.active = false; });

  canvas.addEventListener('touchstart', (e) => { pointer.active = true; updatePointerFromEvent(e); e.preventDefault(); }, {passive:false});
  canvas.addEventListener('touchmove',  (e) => { updatePointerFromEvent(e); e.preventDefault(); }, {passive:false});
  window.addEventListener('touchend',   () => { pointer.active = false; });

  // ---------- UI listeners ----------
  countSlider.addEventListener('input', () => initParticles(parseInt(countSlider.value, 10)));
  forceSlider.addEventListener('input', () => { pointer.force = parseFloat(forceSlider.value); forceLabel.textContent = pointer.force.toFixed(0); });
  modeSelect.addEventListener('change', () => { pointer.mode = modeSelect.value; });
  sizeSlider.addEventListener('input', () => { size = parseInt(sizeSlider.value, 10); sizeLabel.textContent = `${size} px`; });

  // Init UI labels
  countLabel.textContent = N.toLocaleString();
  forceLabel.textContent = pointer.force.toFixed(0);
  sizeLabel.textContent = `${size} px`;

  // ---------- Main loop ----------
  let lastT = performance.now();
  let fpsAcc = 0, fpsCount = 0, lastFpsT = performance.now();

  function step(dt) {
    // Adaptive neighbor cap for performance
    let neighborLimit = 24;
    if (adaptiveCheckbox.checked) {
      // crude heuristic: limit neighbors as N increases
      if (N > 30000) neighborLimit = 16;
      if (N > 60000) neighborLimit = 10;
      if (N > 80000) neighborLimit = 6;
    }

    buildGrid();

    const touchK = pointer.force;
    const sign = (pointer.mode === 'repel') ? -1.0 : 1.0;

    for (let i=0; i<N; i++) {
      let x = posX[i], y = posY[i];
      let vx = velX[i], vy = velY[i];

      // Neighbor interactions within 3x3 cells
      const cx = clamp((x / CELL) | 0, 0, gridCols-1);
      const cy = clamp((y / CELL) | 0, 0, gridRows-1);
      let considered = 0;

      for (let gy = Math.max(0, cy-1); gy <= Math.min(gridRows-1, cy+1); gy++) {
        for (let gx = Math.max(0, cx-1); gx <= Math.min(gridCols-1, cx+1); gx++) {
          let h = head[gy * gridCols + gx];
          while (h !== -1) {
            if (h !== i) {
              const dx = posX[h] - x;
              const dy = posY[h] - y;
              const d2 = dx*dx + dy*dy;
              if (d2 > 0 && d2 < R2) {
                const d = Math.sqrt(d2);
                const nx = dx / d, ny = dy / d;
                // Soft-core repulsion
                const mag = K_REP * (1 - d / R);
                vx -= nx * mag * dt;
                vy -= ny * mag * dt;

                // Viscosity (align velocities a bit)
                vx += (velX[h] - vx) * VISC * dt;
                vy += (velY[h] - vy) * VISC * dt;

                considered++;
                if (considered >= neighborLimit) break;
              }
            }
            h = next[h];
          }
          if (considered >= neighborLimit) break;
        }
        if (considered >= neighborLimit) break;
      }

      // Thumb / mouse force (inverse-square-ish)
      if (pointer.active && touchK > 0) {
        const dx = pointer.x - x, dy = pointer.y - y;
        const d2 = dx*dx + dy*dy + TOUCH_SOFT;
        const d  = Math.sqrt(d2);
        const nx = dx / d, ny = dy / d;
        const f = sign * touchK / d2;
        vx += nx * f * dt;
        vy += ny * f * dt;
      }

      // Damping + clamp
      vx *= DAMP; vy *= DAMP;
      const sp2 = vx*vx + vy*vy;
      if (sp2 > MAX_SPEED*MAX_SPEED) {
        const s = MAX_SPEED / Math.sqrt(sp2);
        vx *= s; vy *= s;
      }

      // Integrate
      x += vx * dt; y += vy * dt;

      // Bounce on bounds
      if (x < 0) { x = 0; vx = Math.abs(vx); }
      if (x > W) { x = W; vx = -Math.abs(vx); }
      if (y < 0) { y = 0; vy = Math.abs(vy); }
      if (y > H) { y = H; vy = -Math.abs(vy); }

      posX[i] = x; posY[i] = y;
      velX[i] = vx; velY[i] = vy;
    }
  }

  function draw() {
    // Trails by translucent overlay
    if (trailsCheckbox.checked) {
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 0.12; // trail strength
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1.0;
    } else {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);
    }

    // Fast squares for speed (much faster than arcs for large N)
    const s = size * dpr;
    for (let i=0; i<N; i++) {
      setColorStyle(color[i]);
      ctx.fillRect(posX[i] - (s*0.5), posY[i] - (s*0.5), s, s);
    }
  }

  function loop() {
    resize();
    updateGridDims();

    const now = performance.now();
    let dt = Math.min(0.04, (now - lastT) / 1000); // clamp to 25 FPS delta max
    lastT = now;

    // Substeps when interacting for stability
    const sub = (pointer.active ? 2 : 1);
    const sdt = dt / sub;
    for (let i=0; i<sub; i++) step(sdt);

    draw();

    // FPS (smoothed)
    const frameNow = performance.now();
    const realFPS = 1000 / Math.max(1, (frameNow - (loop._lastFrameTime || frameNow)));
    loop._lastFrameTime = frameNow;
    fpsAcc += realFPS; fpsCount++;
    if (fpsCount >= 15) { fpsLabel.textContent = `FPS: ${ (fpsAcc/fpsCount).toFixed(0) }`; fpsAcc = 0; fpsCount = 0; }

    requestAnimationFrame(loop);
  }

  // Initialize
  initParticles(N);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
